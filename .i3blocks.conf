# Calendar

[calendar.sh]
label=
command=~/.scripts/calendar.sh
color=#FF8396
markup=pango
interval=5
separator=false


# Time

[time]
label=
color=#FF8396
command=~/.scripts/time
markup=pango
interval=5
separator=false


[battery.sh]
label=
command=~/.scripts/battery.sh
interval=10
separator=false

# Welcome User

[name_block]
label=
color=#FF8396
markup=pango
command=~/.scripts/name_block
interval=once
separator=false
min_width=110
